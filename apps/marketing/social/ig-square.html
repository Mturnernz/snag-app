<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  body {
    width: 1080px; height: 1080px;
    background: linear-gradient(160deg, var(--brand-600) 0%, #1d4ed8 100%);
    color: var(--white);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 88px;
  }
  .logo { font-size: 52px; }
  h1 { font-size: 96px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.08; }
  .steps { display: flex; flex-direction: column; gap: 28px; margin-top: 56px; }
  .step { display: flex; align-items: center; gap: 24px; font-size: 40px; font-weight: 700; }
  .step .n {
    display: flex; align-items: center; justify-content: center;
    width: 72px; height: 72px; border-radius: 999px;
    background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.6);
    font-size: 36px;
  }
  .footer { display: flex; justify-content: space-between; align-items: baseline; font-size: 30px; opacity: 0.75; }
</style>
</head>
<body>
  <div class="mark logo">
    <svg viewBox="0 0 32 32"><rect x="2" y="6" width="28" height="22" rx="6" fill="#fff"/><rect x="11" y="2" width="10" height="6" rx="2" fill="#fff"/><circle cx="16" cy="17" r="6.5" fill="#2563EB"/><circle cx="16" cy="17" r="3" fill="#fff"/></svg>
    SNAG
  </div>
  <div>
    <h1>See something dodgy on site?</h1>
    <div class="steps">
      <div class="step"><span class="n">1</span> Snap a photo</div>
      <div class="step"><span class="n">2</span> One-line description</div>
      <div class="step"><span class="n">3</span> Sorted — with a paper trail</div>
    </div>
  </div>
  <div class="footer">
    <span class="docunation-mark" style="color:#fff">Docu<span style="color:#bfdbfe">nation</span></span>
    <span>Early access · NZ &amp; AU</span>
  </div>
</body>
</html>
