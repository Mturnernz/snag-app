<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  body {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, var(--navy-950) 0%, var(--navy-900) 55%, #1e3a8a 100%);
    color: var(--white);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 72px 80px;
  }
  .logo { font-size: 56px; }
  h1 { font-size: 88px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; }
  h1 .accent { color: var(--brand-500); }
  .sub { font-size: 30px; color: rgba(255,255,255,0.65); font-weight: 500; }
  .footer { display: flex; justify-content: space-between; align-items: baseline; font-size: 24px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
  <div class="mark logo">
    <svg viewBox="0 0 32 32"><rect x="2" y="6" width="28" height="22" rx="6" fill="#2563EB"/><rect x="11" y="2" width="10" height="6" rx="2" fill="#2563EB"/><circle cx="16" cy="17" r="6.5" fill="#0F172A"/><circle cx="16" cy="17" r="3" fill="#2563EB"/></svg>
    SNAG
  </div>
  <div>
    <h1>Spot it. Snag it.<br><span class="accent">Sorted.</span></h1>
    <p class="sub" style="margin-top:28px">Health &amp; safety and issue reporting for NZ &amp; AU workplaces</p>
  </div>
  <div class="footer">
    <span class="docunation-mark">Docu<span class="accent">nation</span></span>
    <span>getsnag — early access open</span>
  </div>
</body>
</html>
