# Netlify site for the marketing site.
# Create a NEW Netlify site pointing at this repo with:
#   - Production branch: website
#   - Base directory:    apps/marketing
# Netlify then reads this file automatically.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Set the real domain once registered, e.g. SITE_URL = "https://getsnag.co.nz"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
